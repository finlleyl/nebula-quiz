version: "2"
sql:
  - engine: postgresql
    schema: internal/storage/migrations
    queries: internal/storage/queries
    gen:
      go:
        package: gen
        sql_package: pgx/v5
        out: internal/storage/gen
        emit_json_tags: true
        emit_interface: true
        emit_prepared_queries: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          - db_type: "citext"
            go_type: "string"
